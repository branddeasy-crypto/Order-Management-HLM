<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Little Mind Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h2>Happy Little Mind</h2>
      <p>Admin Dashboard</p>

      <nav>
        <button class="menu active">Dashboard</button>
        <button class="menu">Produk</button>
        <button class="menu">Order</button>
        <button class="menu">Customer</button>
        <button class="menu">Pembayaran</button>
        <button class="menu">Pengiriman</button>
      </nav>
    </aside>

    <main class="main-content">
      <header>
        <h1>Dashboard</h1>
        <p>Ringkasan operasional order buku anak.</p>
      </header>

      <section class="cards">
        <div class="card">
          <h3>Total Order</h3>
          <p id="totalOrders">0</p>
        </div>

        <div class="card">
          <h3>Menunggu DP</h3>
          <p id="waitingDP">0</p>
        </div>

        <div class="card">
          <h3>Ready Kirim</h3>
          <p id="readyShipping">0</p>
        </div>

        <div class="card">
          <h3>Omzet Bulan Ini</h3>
          <p id="monthlyRevenue">Rp0</p>
        </div>
      </section>

      <section class="panel">
  <h2>Input Order Baru</h2>

  <form id="orderForm" class="order-form">
    <input type="text" id="customerName" placeholder="Nama Customer" required />
    <input type="text" id="whatsapp" placeholder="Nomor WhatsApp" required />
    <input type="text" id="bookTitle" placeholder="Judul Buku" required />
    <input type="number" id="quantity" placeholder="Qty" required />
    <input type="number" id="price" placeholder="Harga Satuan" required />

    <th>Status</th>
    <th>Aksi</th>
      <option value="Menunggu DP">Menunggu DP</option>
      <option value="DP Masuk">DP Masuk</option>
      <option value="Ready Kirim">Ready Kirim</option>
      <option value="Dikirim">Dikirim</option>
      <option value="Selesai">Selesai</option>
    </select>

    <button type="submit">Simpan Order</button>
  </form>
</section>

<section class="panel">
  <h2>Daftar Order</h2>

  <table>
    <thead>
      <tr>
        <th>Customer</th>
        <th>WhatsApp</th>
        <th>Buku</th>
        <th>Qty</th>
        <th>Total</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="orderTableBody">
      <tr>
        <td colspan="7">Belum ada order.</td>
      </tr>
    </tbody>
  </table>
</section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
